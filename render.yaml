# =============================================================================
# render.yaml — Fußballcamp on Render.com (Free Tier)
# =============================================================================
#
# First-time setup:
#   1. Push repo to GitHub
#   2. Render dashboard → New → Blueprint → connect this repo
#   3. Set the env vars marked sync: false in the dashboard
#   4. Click Deploy Blueprint
#
# Each deploy runs:
#   build:  pip install + compile translations + flask db upgrade (migrations)
#   start:  gunicorn
#
# Free tier limits:
#   Web service:  sleeps after 15 min of inactivity (~1 min cold start to wake)
#   PostgreSQL:   expires after 30 days (recreate & redeploy to reset)
#   SMTP ports:   blocked — email is suppressed (MAIL_SUPPRESS_SEND=1)
# =============================================================================

services:
  - type: web
    name: fussballcamp
    runtime: python
    region: frankfurt
    plan: free

    # Migrations are run here (pre-deploy commands are paid-only on Render).
    # flask db upgrade is safe to run on every deploy — it is a no-op when
    # the schema is already up to date.
    buildCommand: |
      pip install -r requirements.txt
      pybabel compile -d translations
      FLASK_APP=application.py flask db upgrade

    startCommand: >
      gunicorn application:app
      --workers 2
      --threads 2
      --timeout 120
      --bind 0.0.0.0:$PORT
      --access-logfile -
      --error-logfile -

    healthCheckPath: /
    autoDeploy: true

    envVars:
      # -----------------------------------------------------------------------
      # Set by Render automatically
      # -----------------------------------------------------------------------
      - key: DATABASE_URL
        fromDatabase:
          name: fussballcamp-db
          property: connectionString

      - key: PORT
        value: 10000

      # -----------------------------------------------------------------------
      # Generate once, never changes
      # -----------------------------------------------------------------------
      - key: SECRET_KEY
        generateValue: true

      # -----------------------------------------------------------------------
      # Fixed values
      # -----------------------------------------------------------------------
      - key: APP_ENV
        value: production

      - key: DISABLE_SCHEDULER
        value: "0"

      - key: DATA_RETENTION_YEARS
        value: "2"

      - key: ANALYTICS_RETENTION_DAYS
        value: "365"

      - key: INVITE_TOKEN_EXPIRY_HOURS
        value: "72"

      - key: VERIFY_TOKEN_EXPIRY_HOURS
        value: "24"

      # Suppress email — Render free tier blocks SMTP ports 25/465/587.
      # Set to "0" if you later add a real SendGrid key.
      - key: MAIL_SUPPRESS_SEND
        value: "1"

      # -----------------------------------------------------------------------
      # Set manually in Render dashboard (sensitive / site-specific)
      # -----------------------------------------------------------------------

      - key: CAMP_NAME
        sync: false

      - key: CAMP_CONTACT_EMAIL
        sync: false

      - key: CAMP_CONTACT_PHONE
        sync: false

      - key: CAMP_LOCATION
        sync: false

      - key: CAMP_ORGANISER_NAME
        sync: false

      - key: CAMP_ORGANISER_ADDRESS
        sync: false

      # Set to any non-empty string (e.g. "demo") — email is suppressed anyway.
      # Replace with a real SendGrid key + set MAIL_SUPPRESS_SEND=0 for live email.
      - key: SENDGRID_API_KEY
        sync: false

      - key: MAIL_DEFAULT_SENDER
        sync: false

      # AWS S3 for image uploads (optional — omit to use local /tmp/ fallback)
      - key: AWS_ACCESS_KEY_ID
        sync: false

      - key: AWS_SECRET_ACCESS_KEY
        sync: false

      - key: AWS_S3_BUCKET
        sync: false

      - key: AWS_S3_REGION
        value: eu-central-1

# =============================================================================
# PostgreSQL — free tier, expires 30 days after creation
# =============================================================================
databases:
  - name: fussballcamp-db
    databaseName: fussballcamp
    user: fussballcamp
    region: frankfurt
    plan: free
    
