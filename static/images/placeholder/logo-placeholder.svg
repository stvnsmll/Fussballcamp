<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <pattern id="dots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.15)"/>
    </pattern>
  </defs>

  <!-- Background pill -->
  <rect x="2" y="2" width="196" height="56" rx="10" fill="#1b3f2a"/>
  <rect x="2" y="2" width="196" height="56" rx="10" fill="url(#dots)"/>

  <!-- Ball icon -->
  <circle cx="30" cy="30" r="18" fill="none" stroke="#b8f442" stroke-width="2.5"/>
  <circle cx="30" cy="30" r="6" fill="#b8f442"/>
  <!-- Hex stitching lines -->
  <line x1="30" y1="12" x2="30" y2="24" stroke="#b8f442" stroke-width="1.5" opacity="0.6"/>
  <line x1="30" y1="36" x2="30" y2="48" stroke="#b8f442" stroke-width="1.5" opacity="0.6"/>
  <line x1="12" y1="30" x2="24" y2="30" stroke="#b8f442" stroke-width="1.5" opacity="0.6"/>
  <line x1="36" y1="30" x2="48" y2="30" stroke="#b8f442" stroke-width="1.5" opacity="0.6"/>

  <!-- "LOGO" label -->
  <text x="58" y="22" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.4)"
        letter-spacing="2" text-anchor="start">LOGO HIER</text>

  <!-- Camp name placeholder -->
  <text x="58" y="38" font-family="Georgia, serif" font-size="15" font-weight="bold"
        fill="white" text-anchor="start" letter-spacing="1">Fußballcamp</text>

  <!-- Dashed border to indicate placeholder -->
  <rect x="2" y="2" width="196" height="56" rx="10" fill="none"
        stroke="#b8f442" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
</svg>
